name: markdown
on:
  pull_request:
    paths:
      - '.github/workflows/markdown.yml'
      - '.github/lychee.toml'
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Declare default permissions as read only.
permissions: read-all

jobs:
  markdown-link-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout cmsis-toolbox
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check markdown links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --config .github/lychee.toml './**/*.md'
          fail: true
          jobSummary: true

  trigger-extension:
    needs: [ markdown-link-checker ]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Trigger vscode-cmsis-solution workflow
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.CROSS_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Open_CMSIS_Pack/vscode-cmsis-solution/actions/workflows/nightly.yml/dispatches \
            -d '{"ref":"main"}'