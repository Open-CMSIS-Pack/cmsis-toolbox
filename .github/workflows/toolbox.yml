name: toolbox
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/toolbox.yml'
      - '.github/matrix_release_includes.json'
      - 'debian/**'
      - 'test/test.py'
      - 'scripts/**'
      - '!docs/**'
      - '!**/*.md'
  pull_request:
    paths:
      - '.github/workflows/toolbox.yml'
      - '.github/matrix_release_includes.json'
      - 'test/test.py'
      - 'scripts/**'
      - '!docs/**'
      - '!**/*.md'
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

jobs:
  matrix_prep:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.build-matrix.outputs.matrix }}
      test: ${{ steps.test-matrix.outputs.matrix }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: JoshuaTheMiller/conditional-build-matrix@81b51eb8d89e07b86404934b5fecde1cea1163a5 # v2.0.1
        id: build-matrix
        with:
          inputFile: '.github/matrix_release_includes.json'
          filter: '[?runOnBranch==`always`]'

      - uses: JoshuaTheMiller/conditional-build-matrix@81b51eb8d89e07b86404934b5fecde1cea1163a5 # v2.0.1
        id: test-matrix-base
        with:
          inputFile: '.github/matrix_release_includes.json'
          filter: '[?runTests==`true`]'

      - name: Generate matrix with cmake versions
        id: test-matrix
        run: |
          base_matrix='${{ steps.test-matrix-base.outputs.matrix }}'
          # Test both CMake versions via workflow matrix
          cmake_versions="[\"3.31.12\", \"4.3.3\"]"
          # base_matrix is expected to be: { "include": [ ... ] }
          # produce: { "include": [ {..config.., cmake_version: ..}, ... ] }
          result=$(jq -nc \
            --argjson base "$base_matrix" \
            --argjson cmake "$cmake_versions" '
              { include: [ $base.include[] as $cfg | $cmake[] as $ver | ($cfg + {cmake_version: $ver}) ] }
            ')
          echo "matrix=$result" >> $GITHUB_OUTPUT

  create_archives:
    if: |
      ${{ github.event_name == 'pull_request' || github.event_name == 'release' }}
    timeout-minutes: 15
    needs: [ matrix_prep ]
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix: ${{ fromJson(needs.matrix_prep.outputs.build) }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout cmsis-toolbox repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Create folders
        run: |
          mkdir -p toolbox

      - name: Download buildmgr release asset
        uses: dsaltares/fetch-gh-release-asset@aa2ab1243d6e0d5b405b973c89fa4d06a2d0fff7 # 1.1.2
        with:
          repo: "Open-CMSIS-Pack/devtools"
          version: tags/tools/buildmgr/2.14.0
          file: cbuild_install.sh
          target: toolbox/cbuild_install.sh
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download projmgr release asset
        uses: dsaltares/fetch-gh-release-asset@aa2ab1243d6e0d5b405b973c89fa4d06a2d0fff7 # 1.1.2
        with:
          repo: "Open-CMSIS-Pack/devtools"
          version: tags/tools/projmgr/2.14.0
          file: projmgr.zip
          target: toolbox/projmgr.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download cbridge release assets
        uses: dsaltares/fetch-gh-release-asset@aa2ab1243d6e0d5b405b973c89fa4d06a2d0fff7 # 1.1.2
        with:
          repo: "Open-CMSIS-Pack/generator-bridge"
          version: tags/v0.10.0
          regex: true
          file: "cbridge_.*\\.(zip|gz)"
          target: "toolbox/"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download cbuild release assets
        uses: dsaltares/fetch-gh-release-asset@aa2ab1243d6e0d5b405b973c89fa4d06a2d0fff7 # 1.1.2
        with:
          repo: "Open-CMSIS-Pack/cbuild"
          version: tags/v2.14.0
          regex: true
          file: "cbuild_.*\\.(zip|gz)"
          target: "toolbox/"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download cbuild2cmake release assets
        uses: dsaltares/fetch-gh-release-asset@aa2ab1243d6e0d5b405b973c89fa4d06a2d0fff7 # 1.1.2
        with:
          repo: "Open-CMSIS-Pack/cbuild2cmake"
          version: tags/v0.11.0
          regex: true
          file: "cbuild2cmake_.*\\.(zip|gz)"
          target: "toolbox/"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download cpackget release assets
        uses: dsaltares/fetch-gh-release-asset@aa2ab1243d6e0d5b405b973c89fa4d06a2d0fff7 # 1.1.2
        with:
          repo: "Open-CMSIS-Pack/cpackget"
          version: tags/v2.2.1
          regex: true
          file: "cpackget_.*\\.(zip|gz)"
          target: "toolbox/"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download packchk release assets
        uses: dsaltares/fetch-gh-release-asset@aa2ab1243d6e0d5b405b973c89fa4d06a2d0fff7 # 1.1.2
        with:
          repo: "Open-CMSIS-Pack/devtools"
          version: tags/tools/packchk/1.4.5
          regex: true
          file: "packchk-.*\\.(zip|tbz2)"
          target: "toolbox/"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download svdconv release assets
        uses: dsaltares/fetch-gh-release-asset@aa2ab1243d6e0d5b405b973c89fa4d06a2d0fff7 # 1.1.2
        with:
          repo: "Open-CMSIS-Pack/devtools"
          version: tags/tools/svdconv/3.3.50
          regex: true
          file: "svdconv-.*\\.(zip|tbz2)"
          target: "toolbox/"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download vidx2pidx release assets
        uses: dsaltares/fetch-gh-release-asset@aa2ab1243d6e0d5b405b973c89fa4d06a2d0fff7 # 1.1.2
        with:
          repo: "Open-CMSIS-Pack/vidx2pidx"
          version: tags/v0.0.5
          regex: true
          file: "vidx2pidx_.*\\.(zip|gz)"
          target: "toolbox/"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Directories
        run: |
          mkdir -p buildmgr
          mkdir -p projmgr
          mkdir -p cbridge
          mkdir -p cbuild
          mkdir -p cbuild2cmake
          mkdir -p cpackget
          mkdir -p packchk
          mkdir -p svdconv
          mkdir -p vidx2pidx
          mkdir -p distribution/bin
          mkdir -p distribution/etc
          mkdir -p distribution/doc
        working-directory: toolbox

      - name: Unzip files Windows
        if: ${{ matrix.target == 'windows'}}
        run: |
          unzip cbridge_\*_${{ matrix.target }}_${{ matrix.arch }}.zip -d cbridge
          unzip cbuild_\*_${{ matrix.target }}_${{ matrix.arch }}.zip -d cbuild
          unzip cbuild2cmake_\*_${{ matrix.target }}_${{ matrix.arch }}.zip -d cbuild2cmake
          unzip cpackget_\*_${{ matrix.target }}_${{ matrix.arch }}.zip -d cpackget
          unzip packchk\*-${{ matrix.target }}-${{ matrix.arch }}.zip -d packchk
          unzip svdconv-\*-${{ matrix.target }}-${{ matrix.arch }}.zip -d svdconv
          unzip vidx2pidx_\*_${{ matrix.target }}_${{ matrix.arch }}.zip -d vidx2pidx
          unzip projmgr.zip -d projmgr
          ./cbuild_install.sh -x buildmgr
        working-directory: toolbox

      - name: Unzip files Linux or Darwin
        if: ${{ matrix.target == 'linux' || matrix.target == 'darwin'}}
        run: |
          tar -xvf cbridge_*_${{ matrix.target }}_${{ matrix.arch }}.tar.gz -C cbridge
          tar -xvf cbuild_*_${{ matrix.target }}_${{ matrix.arch }}.tar.gz -C cbuild
          tar -xvf cbuild2cmake_*_${{ matrix.target }}_${{ matrix.arch }}.tar.gz -C cbuild2cmake
          tar -xvf cpackget_*_${{ matrix.target }}_${{ matrix.arch }}.tar.gz -C cpackget
          tar -xvf packchk-*-${{ matrix.target }}-${{ matrix.arch }}.tbz2 -C packchk
          tar -xvf svdconv-*-${{ matrix.target }}-${{ matrix.arch }}.tbz2 -C svdconv
          tar -xvf vidx2pidx_*_${{ matrix.target }}_${{ matrix.arch }}.tar.gz -C vidx2pidx
          unzip projmgr.zip -d projmgr
          sudo chmod +x ./cbuild_install.sh && ./cbuild_install.sh -x buildmgr
        working-directory: toolbox

      - name: Unzip files Windows & amd64
        if: ${{ matrix.target == 'windows' }}
        run: |
          unzip cbridge_\*_${{ matrix.target }}_${{ matrix.arch }}.zip -d cbridge_${{ matrix.arch }}
          unzip cbuild_\*_${{ matrix.target }}_${{ matrix.arch }}.zip -d cbuild_${{ matrix.arch }}
          unzip cbuild2cmake_\*_${{ matrix.target }}_${{ matrix.arch }}.zip -d cbuild2cmake_${{ matrix.arch }}
          unzip cpackget_\*_${{ matrix.target }}_${{ matrix.arch }}.zip -d cpackget_${{ matrix.arch }}
          unzip packchk\*-${{ matrix.target }}-${{ matrix.arch }}.zip -d packchk_${{ matrix.arch }}
          unzip svdconv-\*-${{ matrix.target }}-${{ matrix.arch }}.zip -d svdconv_${{ matrix.arch }}
          unzip vidx2pidx_\*_${{ matrix.target }}_${{ matrix.arch }}.zip -d vidx2pidx_${{ matrix.arch }}
        working-directory: toolbox

      - name: Unzip files Linux Darwin & amd64
        if: ${{ (matrix.target == 'linux' || matrix.target == 'darwin')}}
        run: |
          mkdir -p projmgr_${{ matrix.arch }}
          mkdir -p cbridge_${{ matrix.arch }}
          mkdir -p cbuild_${{ matrix.arch }}
          mkdir -p cbuild2cmake_${{ matrix.arch }}
          mkdir -p cpackget_${{ matrix.arch }}
          mkdir -p packchk_${{ matrix.arch }}
          mkdir -p svdconv_${{ matrix.arch }}
          mkdir -p vidx2pidx_${{ matrix.arch }}
          tar -xvf cbridge_*_${{ matrix.target }}_${{ matrix.arch }}.tar.gz -C cbridge_${{ matrix.arch }}
          tar -xvf cbuild_*_${{ matrix.target }}_${{ matrix.arch }}.tar.gz -C cbuild_${{ matrix.arch }}
          tar -xvf cbuild2cmake_*_${{ matrix.target }}_${{ matrix.arch }}.tar.gz -C cbuild2cmake_${{ matrix.arch }}
          tar -xvf cpackget_*_${{ matrix.target }}_${{ matrix.arch }}.tar.gz -C cpackget_${{ matrix.arch }}
          tar -xvf packchk-*-${{ matrix.target }}-${{ matrix.arch }}.tbz2 -C packchk_${{ matrix.arch }}
          tar -xvf svdconv-*-${{ matrix.target }}-${{ matrix.arch }}.tbz2 -C svdconv_${{ matrix.arch }}
          tar -xvf vidx2pidx_*_${{ matrix.target }}_${{ matrix.arch }}.tar.gz -C vidx2pidx_${{ matrix.arch }}
        working-directory: toolbox

      - name: Copy Files
        run: |
          mkdir -p cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}/bin
          cp ./buildmgr/bin/cbuildgen${{ matrix.temp_extension }}-${{ matrix.arch }}                        ./cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}/bin/cbuildgen${{ matrix.binary_extension }}
          cp ./projmgr/bin/${{ matrix.target }}-${{ matrix.arch }}/csolution${{ matrix.binary_extension }}  ./cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}/bin/csolution${{ matrix.binary_extension }}
          cp ./cbridge_${{ matrix.arch }}/*/cbridge${{ matrix.binary_extension }}                           ./cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}/bin/cbridge${{ matrix.binary_extension }}
          cp ./cbuild_${{ matrix.arch }}/*/cbuild${{ matrix.binary_extension }}                             ./cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}/bin/cbuild${{ matrix.binary_extension }}
          cp ./cbuild2cmake_${{ matrix.arch }}/*/cbuild2cmake${{ matrix.binary_extension }}                 ./cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}/bin/cbuild2cmake${{ matrix.binary_extension }}
          cp ./cpackget_${{ matrix.arch }}/*/cpackget${{ matrix.binary_extension }}                         ./cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}/bin/cpackget${{ matrix.binary_extension }}
          cp ./packchk_${{ matrix.arch }}/packchk${{ matrix.binary_extension }}                             ./cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}/bin/packchk${{ matrix.binary_extension }}
          cp ./svdconv_${{ matrix.arch }}/svdconv${{ matrix.binary_extension }}                             ./cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}/bin/svdconv${{ matrix.binary_extension }}
          cp ./vidx2pidx_${{ matrix.arch }}/*/vidx2pidx${{ matrix.binary_extension }}                       ./cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}/bin/vidx2pidx${{ matrix.binary_extension }}
        working-directory: toolbox

      - name: Copy Files
        run: |
          curl https://raw.githubusercontent.com/Open-CMSIS-Pack/Open-CMSIS-Pack-Spec/v1.7.57/schema/PACK.xsd --output distribution/etc/PACK.xsd
          curl https://raw.githubusercontent.com/Open-CMSIS-Pack/Open-CMSIS-Pack-Spec/v1.7.57/schema/PackIndex.xsd --output distribution/etc/PackIndex.xsd
          cp ./buildmgr/bin/cbuildgen${{ matrix.temp_extension }}-${{ matrix.arch }}                        ./distribution/bin/cbuildgen${{ matrix.binary_extension }}
          cp -r ./buildmgr/etc/*                                                                            ./distribution/etc
          rm ./distribution/etc/setup
          cp ./projmgr/bin/${{ matrix.target }}-${{ matrix.arch }}/csolution${{ matrix.binary_extension }}  ./distribution/bin/csolution${{ matrix.binary_extension }}
          cp -r ./projmgr/etc/*                                                                             ./distribution/etc
          cp ./cbridge/*/cbridge${{ matrix.binary_extension }}                                              ./distribution/bin/cbridge${{ matrix.binary_extension }}
          cp ./cbridge/*/launch-MCUXpressoConfigTools*                                                      ./distribution/bin/
          cp ./cbridge/*/launch-Infineon_Dev_Config*                                                        ./distribution/bin/
          cp ./cbuild/*/cbuild${{ matrix.binary_extension }}                                                ./distribution/bin/cbuild${{ matrix.binary_extension }}
          cp ./cbuild2cmake/*/cbuild2cmake${{ matrix.binary_extension }}                                    ./distribution/bin/cbuild2cmake${{ matrix.binary_extension }}
          cp ./cpackget/*/cpackget${{ matrix.binary_extension }}                                            ./distribution/bin/cpackget${{ matrix.binary_extension }}
          cp ./packchk/packchk${{ matrix.binary_extension }}                                                ./distribution/bin/packchk${{ matrix.binary_extension }}
          cp ./svdconv/svdconv${{ matrix.binary_extension }}                                                ./distribution/bin/svdconv${{ matrix.binary_extension }}
          cp ./vidx2pidx/*/vidx2pidx${{ matrix.binary_extension }}                                          ./distribution/bin/vidx2pidx${{ matrix.binary_extension }}
          cp ../docs/LICENSE.txt                                                                            ./distribution
          cp ../docs/index.html                                                                             ./distribution/doc
        working-directory: toolbox

      - name: Update toolchain config files
        if: ${{ matrix.target == 'windows' }}
        run: |
          sed -i '/set(EXT/c\  set(EXT .exe)' ./distribution/etc/AC6.6.16.2.cmake
          sed -i '/set(EXT/c\  set(EXT .exe)' ./distribution/etc/GCC.10.3.1.cmake
          sed -i '/set(EXT/c\  set(EXT .exe)' ./distribution/etc/IAR.9.32.1.cmake
          sed -i '/set(EXT/c\  set(EXT .exe)' ./distribution/etc/CLANG.17.0.1.cmake
          sed -i '/set(EXT/c\  set(EXT .exe)' ./distribution/etc/CLANG_TI.4.0.1.cmake
          sed -i '/set(EXT/c\  set(EXT .exe)' ./distribution/etc/XC.5.0.0.cmake
        working-directory: toolbox

      - name: Create output folders
        run: |
          mkdir -p cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}
          cp -r distribution/* cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}
        working-directory: toolbox

      - name: Add execution permission to the binaries and set files ownership
        if: ${{ matrix.target == 'linux' || matrix.target == 'darwin'}}
        run: |
          sudo chmod -R +x bin/*
          sudo chown -R root: *
        working-directory: toolbox/cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pip dependencies
        run: |
            python -m pip install --upgrade pip
            pip install pyyaml

      - name: Generate manifest file
        run: |
          # Get the toolbox version
          TOOLBOX_VERSION=$(git describe --tags || echo "untagged")

          # Set binary extension (default to empty string if not set)
          BINARY_EXTENSION=${{ matrix.binary_extension }}
          [ -z "$BINARY_EXTENSION" ] && BINARY_EXTENSION=""

          # Get absolute path to the toolbox directory
          TOOLBOX_ABS_PATH=$(pwd)/toolbox/cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}

          # Get host machine configuration
          HOST=${{ matrix.target }}-${{ matrix.arch }}

          # Run the Python script to generate the manifest file
          python ./scripts/generate_manifest.py \
            -d "$TOOLBOX_ABS_PATH" \
            -v "$TOOLBOX_VERSION" \
            -e "$BINARY_EXTENSION" \
            --host "$HOST"

      - name: Zip folders Windows
        if: ${{ matrix.target == 'windows'}}
        shell: pwsh
        run: |
          Compress-Archive -Path cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }} -Destination cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}${{ matrix.archive_extension }}
        working-directory: toolbox

      - name: Zip folders Linux Darwin
        if: ${{ matrix.target == 'linux' || matrix.target == 'darwin'}}
        run: |
          tar -czvf cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}${{ matrix.archive_extension }} cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}
        working-directory: toolbox

      - name: Archive binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}
          path: ./toolbox/cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}${{ matrix.archive_extension }}
          retention-days: 1
          if-no-files-found: error

      # Debian Package
      - name: Update dependencies
        if: ${{ matrix.target == 'linux' && matrix.arch == 'amd64' }}
        run: |
            sudo apt-get update
            sudo apt-get install ninja-build

      - name: Create Debian Package
        if: ${{ matrix.target == 'linux' && matrix.arch == 'amd64' }}
        run: |
            mkdir -p ./debian/build
            cmake -G Ninja -S ./debian -B ./debian/build -DTOOLBOX_ROOT=$(realpath ./toolbox/cmsis-toolbox-linux-amd64) -DTOOLBOX_VERSION=$(echo ${{ github.ref }} | cut -d'/' -f3)
            cd ./debian/build
            cpack -G DEB

      - name: Archive Debian Package
        if: ${{ matrix.target == 'linux' && matrix.arch == 'amd64' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cmsis-toolbox-debian-package
          path: ./debian/build/cmsis-toolbox_*_amd64.deb
          retention-days: 1
          if-no-files-found: error

  release-package-tests:
    if: |
      ${{ github.event_name == 'pull_request' || github.event_name == 'release' }}
    needs: [ create_archives ]
    timeout-minutes: 15
    runs-on: ${{ matrix.config.os }}
    name: 'Release Package Test (${{ matrix.config.target }}, ${{ matrix.config.arch }})'
    strategy:
      fail-fast: true
      matrix:
        config:
          - { os: macos-15-intel, target: darwin, arch: amd64 }
          - { os: macos-14, target: darwin, arch: arm64 }
          - { os: windows-2022, target: windows, arch: amd64}
          - { os: windows-2022, target: windows, arch: arm64}
          - { os: ubuntu-22.04, target: linux, arch: amd64}
          - { os: ubuntu-22.04, target: linux, arch: arm64}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout cmsis-toolbox
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Download cmsis toolbox ${{ matrix.config.target }} ${{ matrix.config.arch }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cmsis-toolbox-${{ matrix.config.target }}-${{ matrix.config.arch }}
          path: archive

      - name: Create directory
        run: |
          mkdir -p toolbox

      - name: unzip cmsis-toolbox windows archive
        if: ${{ startsWith(matrix.config.os, 'windows') }}
        run: unzip archive/cmsis-toolbox-${{ matrix.config.target }}-${{ matrix.config.arch }}.zip -d toolbox

      - name: unzip cmsis-toolbox macos/linux archive
        if: ${{ startsWith(matrix.config.os, 'macos') || startsWith(matrix.config.os, 'ubuntu') }}
        run: tar -xvf archive/cmsis-toolbox-${{ matrix.config.target }}-${{ matrix.config.arch }}.tar.gz -C toolbox

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Test with pytest
        run: |
          pytest --base-path=toolbox/cmsis-toolbox-${{ matrix.config.target }}-${{ matrix.config.arch }} test/packaging/tests.py -rA --junitxml=test-results-${{ matrix.config.target }}-${{ matrix.config.arch }}.xml

      - name: Archive test report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: toolbox-test-${{ matrix.config.target }}-${{ matrix.config.arch }}
          path: ./test-results-*.xml
          retention-days: 1
          if-no-files-found: error

  publish-test-results:
    if: github.event_name != 'release'
    name: "Publish Tests Results"
    needs: [ release-package-tests ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: publish test results
        uses: EnricoMi/publish-unit-test-result-action/linux@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
        with:
          report_individual_runs: true
          files: "artifacts/**/test-results-*.xml"

  e2e-tests:
    name: "E2E Test (${{ matrix.runs_on }}, ${{ matrix.arch }}, CMake ${{ matrix.cmake_version }})"
    needs: [ matrix_prep, create_archives ]
    runs-on: ${{ matrix.runs_on }}
    continue-on-error: true
    strategy:
      matrix: ${{ fromJson(needs.matrix_prep.outputs.test) }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout toolbox repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pip dependencies
        run: |
            python -m pip install --upgrade pip
            pip install -r test/e2e/requirements.txt

      - name: Prepare vcpkg config with CMake ${{ matrix.cmake_version }}
        run: |
          jq '.requires."arm:tools/kitware/cmake" = "${{ matrix.cmake_version }}" | .requires."arm:tools/ninja-build/ninja" = "1.13.2"' \
            ./test/vcpkg-configuration.json > ./test/vcpkg-configuration-temp.json

      - name: Setup vcpkg environment
        uses: ARM-software/cmsis-actions/vcpkg@8a50b77681a484568e08f31fb7c2285c4735f682 # v1
        with:
          config: "./test/vcpkg-configuration-temp.json"
          vcpkg-downloads: "${{ github.workspace }}/.vcpkg/downloads"
          cache: "-"

      - name: Confirm CMake selected
        run: |
          echo "cmake_version matrix value: ${{ matrix.cmake_version }}"
          which cmake || true
          cmake --version

      - name: Activate Arm tool license
        run: |
          armlm activate --server https://mdk-preview.keil.arm.com --product KEMDK-COM0
        working-directory: ./test

      - name: Setup XC toolchain
        if: ${{ matrix.runsXCTestSuite == true }}
        uses: ./.github/setup_xc/
        with:
          os: ${{ matrix.target }}
          version: '5.00'

      - name: Download cmsis toolbox ${{ matrix.target }} ${{ matrix.arch }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}
          path: cmsis-toolbox

      - name: Extract cmsis toolbox Windows
        if: ${{ matrix.target == 'windows' }}
        run: |
          unzip cmsis-toolbox/cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}.zip -d cmsis-toolbox_tmp
          cp -r cmsis-toolbox_tmp/cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}/. cmsis-toolbox/
          rm -rf cmsis-toolbox_tmp

      - name: Extract cmsis toolbox Linux Darwin
        if: ${{ matrix.target == 'linux' || matrix.target == 'darwin' }}
        run: |
          tar -xzf cmsis-toolbox/cmsis-toolbox-${{ matrix.target }}-${{ matrix.arch }}.tar.gz -C cmsis-toolbox --strip-components 1

      - name: Set execution permissions
        run: |
          chmod -R +x ./cmsis-toolbox/bin/*

      - name: Get toolbox path
        if: always()
        id: toolbox_path
        run: |
          echo "path=$(echo "$(pwd)/cmsis-toolbox/bin")" >> $GITHUB_OUTPUT

      - name: Run Test
        id: run_robot
        continue-on-error: true
        working-directory: ./test
        env:
          IAR_LMS_BEARER_TOKEN: ${{ secrets.IAR_TOKEN }}
        run: |
          export PATH="${{steps.toolbox_path.outputs.path}}:$PATH"
          robot --outputdir reports-${{ matrix.target }}-${{ matrix.arch }}-cmake${{ matrix.cmake_version }} \
            --variable TEST_ENV_FILE:test-env-${{ matrix.target }}-${{ matrix.arch }}-cmake${{ matrix.cmake_version }}.md \
            --consolewidth=150 --settag ${{ matrix.target }}-${{ matrix.arch }}-cmake${{ matrix.cmake_version }} \
            --name ${{ matrix.target }}-${{ matrix.arch }}-cmake${{ matrix.cmake_version }} \
            ./e2e
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Archive test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reports-${{ matrix.target }}-${{ matrix.arch }}-cmake${{ matrix.cmake_version }}
          path: ./test/reports-${{ matrix.target }}-${{ matrix.arch }}-cmake${{ matrix.cmake_version }}
          retention-days: 1

      - name: Fail job if Robot tests failed
        if: steps.run_robot.outputs.exit_code != '0'
        run: |
          echo "Robot tests failed"
          exit 1

  release:
    if: ${{ github.event_name == 'release' }}
    needs: [ release-package-tests, e2e-tests ]
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download cmsis toolbox windows amd64 zip
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cmsis-toolbox-windows-amd64
          path: toolbox/zip

      - name: Download cmsis toolbox windows arm64 zip
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cmsis-toolbox-windows-arm64
          path: toolbox/zip

      - name: Download cmsis toolbox linux amd64 zip
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cmsis-toolbox-linux-amd64
          path: toolbox/zip

      - name: Download cmsis toolbox linux arm64 zip
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cmsis-toolbox-linux-arm64
          path: toolbox/zip

      - name: Download cmsis toolbox darwin amd64 zip
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cmsis-toolbox-darwin-amd64
          path: toolbox/zip

      - name: Download cmsis toolbox darwin arm64 zip
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cmsis-toolbox-darwin-arm64
          path: toolbox/zip

      - name: Download test report windows-amd64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: toolbox-test-windows-amd64
          path: testreports/

      - name: Download test report windows-arm64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: toolbox-test-windows-arm64
          path: testreports/

      - name: Download unit test report linux-amd64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: toolbox-test-linux-amd64
          path: testreports/

      - name: Download unit test report linux-arm64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: toolbox-test-linux-arm64
          path: testreports/

      - name: Download unit test report darwin-amd64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: toolbox-test-darwin-amd64
          path: testreports/

      - name: Download unit test report darwin-arm64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: toolbox-test-darwin-arm64
          path: testreports/

      - name: Zip test reports
        run: zip -r testreports.zip *
        working-directory: testreports

      - name: Attach test report archive to release assets
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: testreports/testreports.zip
          tag: ${{ github.ref }}
          overwrite: true
          asset_name: testreports.zip

      - name: Calculate checksums
        run: |
          sha256sum cmsis-toolbox-windows-amd64.zip --text > cmsis-toolbox-checksums.txt
          sha256sum cmsis-toolbox-windows-arm64.zip --text >> cmsis-toolbox-checksums.txt
          sha256sum cmsis-toolbox-linux-amd64.tar.gz --text >> cmsis-toolbox-checksums.txt
          sha256sum cmsis-toolbox-linux-arm64.tar.gz --text >> cmsis-toolbox-checksums.txt
          sha256sum cmsis-toolbox-darwin-amd64.tar.gz --text >> cmsis-toolbox-checksums.txt
          sha256sum cmsis-toolbox-darwin-arm64.tar.gz --text >> cmsis-toolbox-checksums.txt
        working-directory: toolbox/zip

      - name: Attach installer to release assets
        id: release_assets
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: toolbox/zip/cmsis-toolbox-*
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true

      # Debian Package
      - name: Download Debian Package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cmsis-toolbox-debian-package
          path: debian

      - name: Attach Debian Package to release assets
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: debian/cmsis-toolbox_*_amd64.deb
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true
