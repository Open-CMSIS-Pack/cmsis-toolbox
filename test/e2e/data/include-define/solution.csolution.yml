solution:
  cdefault:

  packs:
    - pack: ARM::Cortex_DFP
    - pack: ARM::CMSIS

  target-types:
    - type: ARMCM0
      device: ARMCM0
      add-path-asm:
        - ./project/target
      define:
        - RANDOM_CONFIG_FILE_1: <random_config1.h>
        - RANDOM_CONFIG_FILE_2: \"random_config2.h\"

  build-types:
    - type: AC6
      compiler: AC6

    - type: GCC
      compiler: GCC

    - type: IAR
      compiler: IAR

    - type: CLANG
      compiler: CLANG

    - type: XC
      compiler: XC

  projects:
    - project: ./project/project.cproject.yml
